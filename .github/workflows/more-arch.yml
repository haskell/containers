name: More arch CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

defaults:
  run:
    shell: bash

jobs:
  # i386 is 32-bit
  i386:
    runs-on: ubuntu-latest
    container:
      image: i386/ubuntu:bionic
    steps:
    - name: Install
      run: |
        apt-get update -y
        apt-get install -y autoconf build-essential zlib1g-dev libgmp-dev curl libncurses5 libtinfo5 libncurses5-dev libtinfo-dev
        curl --proto '=https' --tlsv1.2 -sSf https://get-ghcup.haskell.org | BOOTSTRAP_HASKELL_NONINTERACTIVE=1 BOOTSTRAP_HASKELL_INSTALL_NO_STACK=1 sh
    - uses: actions/checkout@v1 # This version must stay old enough to remain compatible with the container image
    - name: Test
      run: |
        source ~/.ghcup/env
        ghc --version
        cabal --version
        cabal update
        cabal test all

  # s390x is 31-bit-address/32-bit-data and big-endian
  s390x:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: uraimo/run-on-arch-action@v3
      with:
        arch: s390x

        # Note: Do not use ubuntu24.04 since it comes with ghc and cabal
        # versions that segfault (possibly
        # https://gitlab.haskell.org/ghc/ghc/-/issues/24163).
        distro: ubuntu22.04

        # Not required, but speeds up builds
        githubToken: ${{ github.token }}

        install: |
          apt-get update -y
          apt-get install -y ghc cabal-install
        run: |
          ghc --version
          cabal --version
          cabal update
          cabal test all
