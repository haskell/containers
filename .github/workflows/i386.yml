name: i386 CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

defaults:
  run:
    shell: bash

jobs:
  # i386 is 32-bit
  i386:
    runs-on: ubuntu-latest
    container:
      image: i386/ubuntu:bionic
    steps:
    - name: Install
      uses: haskell/ghcup-setup@v1
      with:
        ghc: recommended
        cabal: recommended
        config: |
          meta-cache: 0
          verbose: True
    - uses: actions/checkout@v1 # This version must stay old enough to remain compatible with the container image
    - name: Test
      run: |
        source ~/.ghcup/env
        ghc --version
        cabal --version
        cabal update
        cabal build all:tests  # Workaround for https://github.com/haskell/cabal/issues/11677
        cabal test all
